<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,-apple-system,'PingFang SC','Noto Sans SC',sans-serif;font-feature-settings:'cv01','ss03';-webkit-font-smoothing:antialiased;--bg:#08090a;--bg2:#0f1011;--bg3:#191a1b;--fg:#f7f8f8;--fg2:#d0d6e0;--fg3:#8a8f98;--fg4:#62666d;--bd:rgba(255,255,255,.05);--bd2:rgba(255,255,255,.08);color:var(--fg2);background:var(--bg);transition:background .3s,color .3s}
body.light{--bg:#f5f3ee;--bg2:#ffffff;--bg3:#ece8e0;--fg:#1a1a1a;--fg2:#444;--fg3:#888;--fg4:#aaa;--bd:rgba(0,0,0,.06);--bd2:rgba(0,0,0,.1);color:var(--fg2);background:var(--bg)}
#app{display:flex;height:100vh}
#sidebar{width:280px;min-width:280px;background:var(--bg2);display:flex;flex-direction:column;border-right:1px solid var(--bd)}
#sidebar header{padding:20px 20px 12px;display:flex;align-items:center;gap:10px}
#sidebar header .logo{width:28px;height:28px;background:linear-gradient(135deg,#5e6ad2,#7170ff);border-radius:6px;display:flex;align-items:center;justify-content:center}
#sidebar header .sp{flex:1}
#sidebar header .tm{background:0;border:1px solid var(--bd2);border-radius:6px;cursor:pointer;padding:5px 7px;color:var(--fg3);font-size:15px;line-height:1;transition:all .15s}
#sidebar header .tm:hover{color:var(--fg);border-color:var(--fg3)}
#sidebar header h1{font-size:15px;font-weight:500;color:var(--fg);letter-spacing:-.165px}
.sw{padding:0 16px 12px}
.sw .sb{display:flex;align-items:center;gap:8px;background:rgba(128,128,128,.05);border:1px solid var(--bd2);border-radius:6px;padding:7px 12px}
.sw .sb:focus-within{border-color:#5e6ad2;box-shadow:0 0 0 3px rgba(94,106,210,.15)}
.sb svg{flex-shrink:0;opacity:.4}
.sb input{flex:1;background:0;border:none;outline:none;color:var(--fg);font-size:13px;font-weight:400;font-family:inherit}
.sb input::placeholder{color:var(--fg4)}
.fb{padding:0 16px 10px;display:flex;flex-wrap:wrap;gap:4px}
.fb .p{font-size:11px;font-weight:500;padding:3px 10px;border-radius:9999px;border:1px solid var(--bd2);background:0;color:var(--fg3);cursor:pointer}
.fb .p:hover{color:var(--fg2);border-color:var(--fg3)}
.fb .p.on{color:var(--fg);border-color:#5e6ad2;background:rgba(94,106,210,.12)}
.nl{flex:1;overflow-y:auto}
.nl::-webkit-scrollbar{width:4px}
.nl::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.ni{display:flex;align-items:center;gap:10px;padding:6px 16px 6px 0;margin:0 8px;cursor:pointer;border-left:3px solid transparent;border-radius:0 4px 4px 0}
.ni:hover{background:rgba(128,128,128,.04)}
.ni.on{background:rgba(94,106,210,.08);border-left-color:#5e6ad2}
.ni .dt{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-left:-3px}
.nlp{position:sticky;top:0;z-index:2;background:var(--bg2);overflow:hidden;padding:2px 0 0}
.nlp::after{content:'';position:absolute;bottom:0;left:11px;right:8px;height:1px;background:linear-gradient(90deg,rgba(251,191,36,.3),rgba(251,191,36,.06) 50%,transparent)}
.nlp::before{content:'';position:absolute;top:0;left:11px;right:8px;height:1px;background:linear-gradient(90deg,rgba(251,191,36,.3),rgba(251,191,36,.06) 50%,transparent)}
.nlp .ni{border-left-color:rgba(251,191,36,.2)}
.nlp .ni:hover{background:rgba(251,191,36,.04)}
.nlp .ni.on{border-left-color:#fbbf24;background:rgba(251,191,36,.08)}
.nlp .ni .tl{color:var(--fg)}
.nls{padding:0 0 2px}
.ni .if{flex:1;min-width:0}
.ni .tl{font-size:13px;font-weight:500;color:var(--fg2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ni.on .tl{color:var(--fg)}
.ni .mt{font-size:11px;color:var(--fg4)}
.stats{padding:8px 20px;border-top:1px solid var(--bd);font-size:11px;color:var(--fg4);display:flex;justify-content:space-between}
.stats .so{background:0;border:1px solid var(--bd2);border-radius:4px;padding:1px 6px;cursor:pointer;color:var(--fg3);font-size:10px;line-height:1.6;transition:all .15s;font-variant-numeric:tabular-nums}
.stats .so:hover{color:var(--fg);border-color:var(--fg3)}
.ni .id{font-size:11px;color:var(--fg4);font-weight:400;margin-right:3px;font-variant-numeric:tabular-nums}
.ni .pb{flex-shrink:0;background:0;border:none;cursor:pointer;padding:0 0 0 4px;font-size:14px;line-height:1;color:var(--fg4);opacity:0;transition:opacity .2s,color .2s,transform .2s}
.ni:hover .pb{opacity:.35}
.ni .pb.pd{opacity:1;color:#fbbf24}
.ni .pb.pd:hover{opacity:1;color:#fcd34d;transform:scale(1.15)}
#cw{flex:1;position:relative;overflow:hidden;background:var(--bg)}
#cw canvas{display:block;width:100%;height:100%}
#legend{position:absolute;bottom:52px;right:16px;background:var(--bg3);backdrop-filter:blur(8px);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;z-index:6;font-size:11px;line-height:1.7;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.3)}
#legend .lt{color:var(--fg4);font-size:10px;margin-bottom:5px;letter-spacing:.4px;text-transform:uppercase}
#legend .le{display:flex;align-items:center;gap:6px;color:var(--fg3)}
#legend .ld{width:16px;height:2.5px;border-radius:1.5px;flex-shrink:0}
#dt{position:absolute;top:0;right:0;width:400px;max-width:85vw;height:100%;background:var(--bg2);backdrop-filter:blur(20px);border-left:1px solid var(--bd);transform:translateX(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);overflow-y:auto;z-index:10}
#dt.on{transform:translateX(0)}
#dt::-webkit-scrollbar{width:4px}
#dt::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
.dh{padding:20px 20px 16px;border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:flex-start}
.dh .tg{flex:1;min-width:0}

.dh h3{font-size:16px;font-weight:500;color:var(--fg);word-break:break-word;line-height:1.4}

.dc:hover{color:#e74c3c}
.db{padding:20px;font-size:13px;line-height:1.8;color:var(--fg3);word-break:break-word}
.db .em{color:var(--fg4);font-style:italic;font-size:12px}
.db h1,.db h2,.db h3{color:var(--fg);font-weight:500;margin:16px 0 8px;letter-spacing:-.3px}
.db h1{font-size:16px}.db h2{font-size:15px}.db h3{font-size:14px}
.db p{margin:0 0 8px}
.db code{font-family:'JetBrains Mono',monospace;font-size:12px;background:rgba(128,128,128,.1);padding:1px 5px;border-radius:3px;color:var(--fg2)}
.db pre{background:rgba(128,128,128,.06);border-radius:6px;padding:12px;overflow-x:auto;margin:8px 0;border:1px solid var(--bd)}
.db pre code{background:0;padding:0;border-radius:0}
.db ul,.db ol{padding-left:20px;margin:4px 0 8px}
.db li{margin:2px 0}
.db strong{color:var(--fg);font-weight:500}
.db a{color:#5e6ad2;text-decoration:none}
.db a:hover{text-decoration:underline}
.db blockquote{border-left:3px solid var(--bd2);padding:4px 12px;margin:8px 0;color:var(--fg4);background:rgba(128,128,128,.03);border-radius:0 4px 4px 0}
.db table{border-collapse:collapse;margin:8px 0;width:100%;font-size:12px}
.db th,.db td{padding:6px 10px;border:1px solid var(--bd);text-align:left}
.db th{background:rgba(128,128,128,.05);color:var(--fg2);font-weight:500}
.db hr{border:none;border-top:1px solid var(--bd);margin:12px 0}
.dtgs{display:flex;flex-wrap:wrap;gap:4px;padding:0 20px 16px}
.dtgs .tag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:9999px;background:rgba(128,128,128,.06);color:var(--fg3);border:1px solid var(--bd2)}
.dls{padding:16px 20px 20px;border-top:1px solid var(--bd)}
.dls h4{font-size:11px;font-weight:500;color:var(--fg4);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.dls .li{display:flex;align-items:center;gap:8px;padding:5px 8px;margin-bottom:2px;border-radius:4px;cursor:pointer;font-size:12px;color:var(--fg3)}
.dls .li:hover{background:rgba(128,128,128,.06);color:var(--fg2)}
.dls .li .sdt{width:6px;height:6px;border-radius:50%;flex-shrink:0}
#tp{position:fixed;pointer-events:none;background:var(--bg3);backdrop-filter:blur(8px);color:var(--fg2);padding:6px 12px;border-radius:6px;font-size:12px;border:1px solid var(--bd2);display:none;z-index:20;max-width:280px;line-height:1.5;box-shadow:0 4px 12px rgba(0,0,0,.3)}
#tp .th{color:var(--fg);font-weight:500}
#tp .tt{font-size:10px;color:var(--fg4);margin-top:2px}
#hud{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg3);backdrop-filter:blur(8px);border:1px solid var(--bd);border-radius:8px;padding:8px 16px;display:flex;align-items:center;gap:16px;font-size:11px;color:var(--fg4);z-index:5;pointer-events:none}
#hud kbd{font-family:'JetBrains Mono',monospace;font-size:10px;padding:1px 5px;border-radius:3px;background:rgba(128,128,128,.08);color:var(--fg3);border:1px solid var(--bd)}
</style></head><body>
<div id="app">
<div id="sidebar">
<header><div class="logo"><svg width="16" height="16" viewBox="0 0 32 32" fill="none"><circle cx="12" cy="10" r="4" fill="#fff"/><circle cx="22" cy="8" r="3.5" fill="#fff" opacity=".8"/><circle cx="16" cy="22" r="4.5" fill="#fff"/><line x1="12" y1="10" x2="22" y2="8" stroke="#fff" stroke-width="1.2" opacity=".5"/><line x1="12" y1="10" x2="16" y2="22" stroke="#fff" stroke-width="1.2" opacity=".5"/><line x1="22" y1="8" x2="26" y2="20" stroke="#fff" stroke-width="1.2" opacity=".5"/></svg></div><h1>知识图谱</h1><span class="sp"></span><button class="tm" id="tmBtn">&#x263E;</button></header>
<div class="sw"><div class="sb">
<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="#8a8f98" stroke-width="1.5"/><path d="M10 10l3 3" stroke="#8a8f98" stroke-width="1.5" stroke-linecap="round"/></svg>
<input id="q" type="text" placeholder="搜索节点...">
</div></div>
<div class="fb" id="fb"></div>
<div class="nl" id="nl"><div class="nlp" id="nlp"></div><div class="nls" id="nls"></div></div>
<div class="stats"><span id="sc"></span><span><button class="so" id="so"># ↓</button> <span id="ss"></span></span></div>
</div>
<div id="cw">
<canvas id="cv"></canvas>
<div id="tp"></div>
<div id="dt">
<div class="dh"><div class="tg"><span class="bd" id="dbg"></span><h3 id="dti"></h3></div><button class="dc" id="dtc">&#x2715;</button></div>
<div class="db" id="dtb"><span class="em">加载中...</span></div>
<div class="dtgs" id="dtg"></div>

</div>

<span>滚轮<span style="color:var(--fg4);opacity:.5"> &middot; </span>缩放</span>
<span>拖拽<span style="color:var(--fg4);opacity:.5"> &middot; </span>平移</span>

<script src="https://d3js.org/d3.v7.min.js"></script>

<script>
/* ===================================================================
   Knowledge Vault — Knowledge Graph Visualization
   D3.js v7 force-directed layout + Canvas 2D rendering
   =================================================================== */

// ─── State ──────────────────────────────────────────────────────────────────
var N=[],L=[],M={},W=0,H=0,S=null,FT=null,OX=0,OY=0,Z=1,sim,TI=0,TC=0,
    HM={ox:0,oy:0,z:1},DARK=1,SO='asc',EZ=0,EZ_ST=0,TGT={ox:0,oy:0,z:1};

var cv=document.getElementById('cv'),cx=cv.getContext('2d');

// Node colors by type
var NC={"rule":"#4a90d9","checklist":"#7b68ee","trap":"#34d399",
        "standard":"#fbbf24","case":"#f472b6","reference":"#a78bfa",
        "doc":"#f97316","note":"#94a3b8"};

// Edge colors by type
var EC={"references":"#5a5a7a","related_to":"#5a5a7a","works_at":"#5e6ad2",
        "created":"#22c55e","uses":"#22c55e","mentions":"#94a3b8",
        "builds_on":"#f59e0b","contradicts":"#ef4444","similar_to":"#8b5cf6",
        "part_of":"#6366f1"};

marked.setOptions({breaks:true,gfm:true});

// ─── Theme ──────────────────────────────────────────────────────────────────
document.getElementById('tmBtn').onclick=function(){
  DARK=!DARK;document.body.classList.toggle('light',!DARK);
  this.textContent=DARK?'\u263E':'\u2600';draw();
};

// ─── Canvas helpers ─────────────────────────────────────────────────────────
function rs(){
  var r=cv.parentElement.getBoundingClientRect();
  W=r.width;H=r.height;
  var d=window.devicePixelRatio||1;
  cv.width=W*d;cv.height=H*d;
  cx.setTransform(d,0,0,d,0,0);
}
function gp(e){
  var r=cv.getBoundingClientRect();
  return{x:(e.clientX-r.left-W/2)/Z-OX,y:(e.clientY-r.top-H/2)/Z-OY};
}
function ht(x,y){
  for(var i=N.length-1;i>=0;i--){
    var n=N[i],d=Math.hypot(n.x-x,n.y-y);
    if(d<15/Z)return n;
  }
  return null;
}

// ─── Degree calculation ─────────────────────────────────────────────────────
function calcDeg(){
  N.forEach(function(n){n.dg=0});
  L.forEach(function(l){
    var a=typeof l.source=='object'?l.source:M[l.source],
        b=typeof l.target=='object'?l.target:M[l.target];
    if(a)a.dg=(a.dg||0)+1;if(b)b.dg=(b.dg||0)+1;
  });
  var mx=1;
  N.forEach(function(n){if(n.dg>mx)mx=n.dg});
  N.forEach(function(n){n.ds=1+(n.dg/mx)*3});
}

// ─── Camera ─────────────────────────────────────────────────────────────────
function fitView(){
  if(!N.length)return;
  var mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity;
  N.forEach(function(n){if(n.x<mnX)mnX=n.x;if(n.x>mxX)mxX=n.x;
                         if(n.y<mnY)mnY=n.y;if(n.y>mxY)mxY=n.y});
  var z=Math.min((W-40)/(mxX-mnX||1),(H-40)/(mxY-mnY||1),10);
  TGT.ox=-(mnX+mxX)/2;TGT.oy=-(mnY+mxY)/2;TGT.z=Math.max(z,.1);
  EZ=1;EZ_ST=performance.now();
}
function goHome(){
  TGT.ox=HM.ox;TGT.oy=HM.oy;TGT.z=HM.z;
  EZ=1;EZ_ST=performance.now();
  S=null;document.getElementById('dt').classList.remove('on');
  updateList();
}

// ─── Draw (Canvas 2D render loop) ──────────────────────────────────────────
var bgC=['#08090a','#f8f6f2'];
function draw(){
  // EZ easing (700ms easeOutCubic)
  if(EZ){
    var t=(performance.now()-EZ_ST)/700;
    if(t>=1){t=1;EZ=0}
    var e=1-Math.pow(1-t,3);
    OX+=(TGT.ox-OX)*e*0.3;OY+=(TGT.oy-OY)*e*0.3;Z+=(TGT.z-Z)*e*0.3;
    if(t>=1){OX=TGT.ox;OY=TGT.oy;Z=TGT.z;EZ=0}
  }

  cx.clearRect(0,0,W,H);
  cx.fillStyle=bgC[DARK?0:1];
  cx.fillRect(0,0,W,H);
  cx.save();
  cx.translate(W/2,H/2);
  cx.scale(Z,Z);
  cx.translate(OX,OY);

  // Keep animating while easing or sim running
  if(EZ||sim&&sim.alpha()>0.001)setTimeout(draw,16);
  TI+=0.02;

  // ── Edges ──
  L.forEach(function(l){
    var a=typeof l.source=='object'?l.source:M[l.source],
        b=typeof l.target=='object'?l.target:M[l.target];
    if(!a||!b)return;
    // Skip non-visible in connection view
    if(S!=null&&a.i!=S.i&&b.i!=S.i)return;
    var lc=l.cl||(DARK?'rgba(255,255,255,.2)':'rgba(0,0,0,.08)');
    cx.globalAlpha=1;
    if(S!=null&&(a.i==S.i||b.i==S.i)){cx.strokeStyle=lc;cx.lineWidth=1.5;cx.globalAlpha=.6}
    else if(S!=null&&false){cx.strokeStyle=lc;cx.lineWidth=.8;cx.globalAlpha=.35}
    else{cx.strokeStyle=lc;cx.lineWidth:.5;cx.globalAlpha=.2}
    // Curved edge
    if(a==b){cx.beginPath();cx.arc(a.x,a.y-20,15,0,Math.PI*2);cx.stroke();return}
    var mx=(a.x+b.x)/2,my=(a.y+b.y)/2,dx=b.x-a.x,dy=b.y-a.y,
        len=Math.hypot(dx,dy)||1;
    var cp1=a.x+dx*0.25+dy*0.1/len*15,
        cp2=a.y+dy*0.25-dx*0.1/len*15;
    if(a.i>b.i){cp1=a.x+dx*0.25-dy*0.1/len*15;cp2=a.y+dy*0.25+dx*0.1/len*15}
    cx.beginPath();cx.moveTo(a.x,a.y);
    cx.quadraticCurveTo(cp1,cp2,b.x,b.y);
    cx.stroke();
  });
  cx.globalAlpha=1;

  // ── Nodes ──
  N.forEach(function(n){
    var r=5,sa=S&&S.i==n.i,sh=n==hv,inF=S&&L.some(function(l){
      var s=typeof l.source=='object'?l.source.i:l.source,
          t=typeof l.target=='object'?l.target.i:l.target;
      return s==n.i||t==n.i;
    });

    if(S!=null&&!sa&&!inF)return; // hide non-connected

    // Selected: breathing glow
    if(sa){r=10;
      cx.globalAlpha=0.15;cx.fillStyle=n.c;
      cx.beginPath();cx.arc(n.x,n.y,r+8+Math.sin(TI*3)*1.2,0,Math.PI*2);cx.fill();
      cx.globalAlpha=1;
    }
    // Connected: micro glow
    if(inF&&!sa){
      cx.globalAlpha=.15;cx.fillStyle=n.c;
      cx.beginPath();cx.arc(n.x,n.y,r+3,0,Math.PI*2);cx.fill();
      cx.globalAlpha=1;
    }

    cx.fillStyle=n.c;
    cx.beginPath();cx.arc(n.x,n.y,r,0,Math.PI*2);cx.fill();

    // Selected/hovered border
    if(sa){cx.strokeStyle='rgba(255,255,255,.6)';cx.lineWidth=3;cx.stroke()}
    else if(sh){cx.strokeStyle='rgba(255,255,255,.8)';cx.lineWidth=2;cx.stroke()}

    // Label
    if(sa||sh||Z>1.2){
      cx.fillStyle=DARK?'rgba(0,0,0,.85)':'rgba(255,255,255,.85)';
      var tw=cx.measureText(n.n||'').width;
      cx.fillRect(n.x-8,n.y-8-r,tw+16,20);
      cx.fillStyle=DARK?'#f7f8f8':'#333';
      cx.font='11px Inter,sans-serif';
      cx.textBaseline='middle';
      cx.fillText(n.n||'',n.x-4,n.y-3-r);
    }
  });

  cx.restore();
}

// ─── D3 Force Simulation ───────────────────────────────────────────────────
function buildSim(){
  sim=d3.forceSimulation(N)
    .force('link',d3.forceLink(L).distance(25).strength(1.0))
    .force('charge',d3.forceManyBody().strength(-30))
    .force('center',d3.forceCenter())
    .force('collide',d3.forceCollide().radius(function(d){return 6+(d.ds||0)*2}))
    .alphaDecay(0.03)
    .velocityDecay(0.4);

  var lastDraw=0;
  sim.on('tick',function(){
    var now=performance.now();
    if(now-lastDraw<50&&sim.alpha()<0.01)return; // throttle to ~20fps after settle
    lastDraw=now;
    draw();
  });

  sim.on('end',function(){draw();});
}

// ─── Data Loading ──────────────────────────────────────────────────────────
function loadData(){
  fetch('/api/data').then(function(r){return r.json()}).then(function(G){
    N=G.nodes;L=G.links.map(function(l){
      return {source:l.s,target:l.t,r:l.r,cl:l.cl};
    });
    M={};N.forEach(function(n){M[n.i]=n});
    calcDeg();

    // Build filter pills
    var types={},order=['rule','trap','reference','note','standard','checklist','case','doc'];
    N.forEach(function(n){if(n.tp)types[n.tp]=(types[n.tp]||0)+1});
    var fb=document.getElementById('fb');
    fb.innerHTML='<button class="p on" data-t="">所有 ('+N.length+')</button>';
    order.forEach(function(t){
      if(!types[t])return;
      fb.innerHTML+='<button class="p" data-t="'+t+'">'+
        ({rule:'规则',checklist:'清单',trap:'陷阱',standard:'标准',
          case:'案例',reference:'引用',doc:'文档',note:'笔记'}[t]||t)+
        ' ('+types[t]+')</button>';
    });
    fb.querySelectorAll('.p').forEach(function(b){
      b.onclick=function(){
        fb.querySelectorAll('.p').forEach(function(x){x.classList.remove('on')});
        this.classList.add('on');
        FT=this.getAttribute('data-t')||null;
        S=null;document.getElementById('dt').classList.remove('on');
        updateList();
        // Gentle reheat + filter fit
        sim.alpha(0.1).restart();
        setTimeout(function(){
          // BBox of filtered nodes
          var mnX=Infinity,mxX=-Infinity,mnY=Infinity,mxY=-Infinity,found=0;
          N.forEach(function(n){
            if(FT&&n.tp!==FT)return;
            if(n.x<mnX)mnX=n.x;if(n.x>mxX)mxX=n.x;
            if(n.y<mnY)mnY=n.y;if(n.y>mxY)mxY=n.y;found++;
          });
          if(found){
            var z=Math.min((W-40)/(mxX-mnX||1),(H-40)/(mxY-mnY||1),10);
            TGT.ox=-(mnX+mxX)/2;TGT.oy=-(mnY+mxY)/2;TGT.z=Math.max(z,.1);
            EZ=1;EZ_ST=performance.now();
          }
        },100);
      };
    });

    buildSim();
    sim.alpha(0.2).restart();

    // Legend
    var lg=document.getElementById('lg');
    var shown={};
    L.forEach(function(l){
      if(shown[l.r])return;shown[l.r]=1;
      lg.innerHTML+='<div class="le"><div class="ld" style="background:'+
        (l.cl||'#5a5a7a')+'"></div>'+l.r+'</div>';
    });

    updateList();
    setTimeout(function(){if(!S){HM.ox=OX;HM.oy=OY;HM.z=Z}},3000);
  });
}

// ─── List (Sidebar) ────────────────────────────────────────────────────────
function updateList(){
  var f=N.filter(function(n){return!(FT&&n.tp!==FT)&&(!Q||(n.n||'').toLowerCase().indexOf(Q)>-1||(n.g||[]).some(function(t){return t.indexOf(Q)>-1}))});
  f.sort(function(a,b){
    if(a.pn!=b.pn)return b.pn-a.pn;
    return SO==='asc'?a.i-b.i:b.i-a.i;
  });

  var pinned=[],normal=[];
  f.forEach(function(n){(n.pn?pinned:normal).push(n)});

  function render(n,on){
    var pc=n.pn?' pd':'',ps=n.pn?'★':'☆';
    var tpl='<div class="ni'+(on?' on':'')+'" data-i="'+n.i+'">'+
      '<span class="dt" style="background:'+(NC[n.tp]||'#94a3b8')+'"></span>'+
      '<div class="if"><div class="tl"><span class="id">#'+n.i+'</span>'+(n.n||'')+'</div>'+
      '<div class="mt">'+(n.tp||'n')+' &middot; '+(n.dg||0)+'连接</div></div>'+
      '<button class="pb'+pc+'" data-i="'+n.i+'">'+ps+'</button></div>';
    return tpl;
  }

  document.getElementById('nlp').innerHTML=pinned.map(function(n){return render(n,S&&S.i==n.i)}).join('');
  document.getElementById('nls').innerHTML=normal.map(function(n){return render(n,S&&S.i==n.i)}).join('');
  document.getElementById('sc').textContent=N.length+' 节点'+(FT?' ('+f.length+' 显示)':'');
  document.getElementById('ss').textContent=f.length+' 显示';

  // Attach click handlers
  document.querySelectorAll('.ni').forEach(function(el){
    el.onclick=function(){selectNode(parseInt(this.getAttribute('data-i')))};
    var pb=el.querySelector('.pb');
    if(pb)pb.onclick=function(e){
      e.stopPropagation();
      var id=parseInt(this.getAttribute('data-i'));
      fetch('/api/pin?id='+id).then(function(r){return r.json()}).then(function(d){
        if(d.pinned!==undefined){M[id].pn=d.pinned;updateList();draw()}
      });
    };
  });
}

// ─── Node Selection ────────────────────────────────────────────────────────
function selectNode(id){
  var n=M[id];if(!n)return;
  S=n;
  // Compute BBox of selected + neighbors
  var mnX=n.x,mxX=n.x,mnY=n.y,mxY=n.y;
  L.forEach(function(l){
    var s=typeof l.source=='object'?l.source:M[l.source],
        t=typeof l.target=='object'?l.target:M[l.target];
    if(!s||!t)return;
    var o=s.i==n.i?t:(t.i==n.i?s:null);
    if(!o)return;
    if(o.x<mnX)mnX=o.x;if(o.x>mxX)mxX=o.x;
    if(o.y<mnY)mnY=o.y;if(o.y>mxY)mxY=o.y;
  });
  var z2=Math.min((W-400)/(mxX-mnX||1),(H-400)/(mxY-mnY||1),1.8);
  TGT.ox=-(mnX+mxX)/2;TGT.oy=-(mnY+mxY)/2;TGT.z=Math.max(z2,.3);
  EZ=1;EZ_ST=performance.now();EZ_F=1;
  updateList();showDetail(n);
}

function showDetail(n){
  document.getElementById('dt').classList.add('on');
  var dtb=document.getElementById('dtb');
  var dtg=document.getElementById('dtg');
  var dtl=document.getElementById('dtl');
  document.getElementById('dti').textContent=n.n||'';
  var bg=NC[n.tp]||'#94a3b8';
  document.getElementById('dbg').style.background=bg;
  document.getElementById('dbg').textContent=n.tp||'note';

  fetch('/api/node?id='+n.i).then(function(r){return r.json()}).then(function(d){
    if(d.content_raw){
      dtb.innerHTML=marked.parse(d.content_raw||'');
    } else {dtb.innerHTML='<span class="em">无内容</span>'}

    dtg.innerHTML=(n.g||[]).map(function(t){
      return '<span class="tag">#'+t.replace(/^#/,'')+'</span>'
    }).join('');

    // Related nodes
    dtl.innerHTML='';
    L.forEach(function(l){
      var a=typeof l.source=='object'?l.source:M[l.source],
          b=typeof l.target=='object'?l.target:M[l.target];
      var o=a&&a.i==n.i?b:(b&&b.i==n.i?a:null);
      if(!o||!o.n)return;
      var lc=l.cl||'#5a5a7a';
      dtl.innerHTML+='<div class="li" onclick="selectNode('+o.i+')">'+
        '<div class="sdt" style="background:'+lc+'"></div>'+
        '<span>'+o.n+'</span></div>';
    });
  });
}

// ─── Canvas Events ─────────────────────────────────────────────────────────
var hv=null;

cv.onmousemove=function(e){
  var p=gp(e),n=ht(p.x,p.y);
  hv=n;
  var tp=document.getElementById('tp');
  if(n){tp.style.display='block';tp.style.left=(e.clientX+14)+'px';tp.style.top=(e.clientY+14)+'px';
    tp.innerHTML='<div class="th">'+n.n+'</div><div class="tt">#'+n.i+' &middot; '+(n.tp||'note')+'</div>'}
  else{tp.style.display='none'}
  draw();
};

cv.onclick=function(e){
  var p=gp(e),n=ht(p.x,p.y);
  if(n){selectNode(n.i)}
};

cv.ondblclick=function(){goHome()};

cv.onwheel=function(e){
  e.preventDefault();
  var ds=e.deltaY>0?0.9:1.1;
  var p=gp(e);
  Z=Math.max(0.05,Math.min(20,Z*ds));
  OX+=(1-ds)*p.x;OY+=(1-ds)*p.y;
  draw();
};

var _pd=null;
cv.onmousedown=function(e){
  _pd={x:e.clientX,y:e.clientY,ox:OX,oy:OY};
  cv.style.cursor='grabbing';
};
cv.onmouseup=function(){
  _pd=null;cv.style.cursor='default';
};
cv.onmouseleave=function(){
  _pd=null;hv=null;document.getElementById('tp').style.display='none';draw();
};
cv.onmousemove=function(e){
  var p=gp(e),n=ht(p.x,p.y);
  cv.style.cursor=n?'pointer':'default';
  if(_pd){
    OX=_pd.ox+(e.clientX-_pd.x)/Z;
    OY=_pd.oy+(e.clientY-_pd.y)/Z;
    draw();
  }
  hv=n;
  var tp=document.getElementById('tp');
  if(n){tp.style.display='block';tp.style.left=(e.clientX+14)+'px';tp.style.top=(e.clientY+14)+'px';
    tp.innerHTML='<div class="th">'+n.n+'</div><div class="tt">#'+n.i+' &middot; '+(n.tp||'note')+'</div>'}
  else{tp.style.display='none'}
};

// Keyboard
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){if(S){goHome()}else if(FT){FT=null;document.querySelector('#fb .p').click()}}
});

// Search
var Q='';
document.getElementById('q').addEventListener('input',function(){
  Q=this.value.toLowerCase().trim();
  updateList();
});

// Sort
document.getElementById('so').onclick=function(){
  SO=SO==='asc'?'desc':'asc';
  this.textContent=SO==='asc'?'# ↓':'# ↑';
  updateList();
};

// Close detail
document.getElementById('dtc').onclick=function(){goHome()};

// ─── Init ──────────────────────────────────────────────────────────────────
window.addEventListener('resize',function(){rs();draw()});
rs();
loadData();
</script>
