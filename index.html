<script>
var N=[],L=[],M={},W=0,H=0,S=null,FT=null,FT_tag=null,ET=null,HL=1,DRIFT=1,DRIFT_CD=0,OX=0,OY=0,Z=1,sim,TI=0,FT_T=0,TC=0,HM={ox:0,oy:0,z:1},DARK=1,SO='asc';
var cv=document.getElementById('cv'),cx=cv.getContext('2d');
var NC={"rule":"#4a90d9","checklist":"#7b68ee","trap":"#34d399","standard":"#fbbf24","case":"#f472b6","reference":"#a78bfa","doc":"#f97316","note":"#94a3b8","implementation-log":"#14b8a6","architecture-decision":"#ef4444"};
var EC={"references":"#5a5a7a","related_to":"#5a5a7a","works_at":"#5e6ad2","created":"#22c55e","uses":"#22c55e","mentions":"#94a3b8","builds_on":"#f59e0b","contradicts":"#ef4444","similar_to":"#8b5cf6","part_of":"#6366f1","supersedes":"#e74c3c","conflicts_with":"#e67e22","complements":"#2ecc71","implements":"#06b6d4","depends_on":"#f97316","referenced_by":"#64748b"};
var TYPE_TXT={"rule":"规则","checklist":"检查清单","trap":"陷阱","standard":"标准","case":"案例","reference":"参考","doc":"文档","note":"笔记","implementation-log":"实施记录","architecture-decision":"架构决策"};
var REL_TXT={"references":"引用","related_to":"相关","works_at":"任职于","created":"创建","uses":"使用","mentions":"提及","builds_on":"基于","contradicts":"矛盾","similar_to":"相似","part_of":"属于","supersedes":"替代","conflicts_with":"冲突","complements":"互补","implements":"实现","depends_on":"依赖","referenced_by":"被引用"};
var DOMAIN_TXT={"tech":"技术","project":"项目","fiction":"小说设定","note":"笔记","infra":"基础设施","profile":"用户画像","deepshen":"DeepShen"};
var TGT={ox:0,oy:0,z:1},EZ=0,EZ_ST=0;
marked.setOptions({breaks:true,gfm:true});
function labelType(t){return TYPE_TXT[t]||t||'笔记'}
function labelRel(r){return REL_TXT[r]||r||'引用'}

// ── 夜间慢速漂流 ────────────────────────
var driftPhase=Math.random()*100;
function pauseDrift(){DRIFT_CD=performance.now()+2000}
function driftTick(){
  if(!DRIFT||S)return setTimeout(driftTick,200);
  if(DRIFT_CD&&performance.now()<DRIFT_CD)return setTimeout(driftTick,100);
  driftPhase+=0.008;
  N.forEach(function(n,i){
    if(FT&&n.tp!==FT)return;
    if(FT_tag&&(!n.g||n.g.indexOf(FT_tag)<0))return;
    var a=driftPhase+i*0.7;
    n.x+=Math.cos(a)*0.06;
    n.y+=Math.sin(a)*0.06;
  });
  // 碰撞检测——可见节点不能互相穿透
  for(var ci=0;ci<N.length;ci++){
    if(FT&&N[ci].tp!==FT||FT_tag&&(!N[ci].g||N[ci].g.indexOf(FT_tag)<0))continue;
    for(var cj=ci+1;cj<N.length;cj++){
      if(FT&&N[cj].tp!==FT||FT_tag&&(!N[cj].g||N[cj].g.indexOf(FT_tag)<0))continue;
      var dx=N[cj].x-N[ci].x,dy=N[cj].y-N[ci].y,dist=Math.hypot(dx,dy)||0.01;
      var minD=12;
      if(dist<minD){
        var push=(minD-dist)/dist*0.45;
        N[ci].x-=dx*push;N[ci].y-=dy*push;
        N[cj].x+=dx*push;N[cj].y+=dy*push;
      }
    }
  }
  draw();
  setTimeout(driftTick,50);
}

// ── 状态持久化 ──────────────────────────
function saveState(){
  try{localStorage.setItem('kg_state',JSON.stringify({
    dark:DARK,filter:FT||'',tag:FT_tag||'',et:ET?ET.join(','):'',hl:HL,sel:S?S.i:null,sort:SO
  }))}catch(e){}
}
function loadState(){
  try{

function draw(){
  if(EZ){var t=(performance.now()-EZ_ST)/700;if(t>=1){t=1;EZ=0}var e=1-Math.pow(1-t,3);OX+=(TGT.ox-OX)*e*0.3;OY+=(TGT.oy-OY)*e*0.3;Z+=(TGT.z-Z)*e*0.3;if(t>=1){OX=TGT.ox;OY=TGT.oy;Z=TGT.z;EZ=0}}
  cx.clearRect(0,0,W,H);cx.fillStyle=bgC[DARK?0:1];cx.fillRect(0,0,W,H);
  cx.save();cx.translate(W/2,H/2);cx.scale(Z,Z);cx.translate(OX,OY);
  if(EZ||sim&&sim.alpha()>0.001)setTimeout(draw,16);
  TI+=0.02;

  var vis={},fade=1;
  if(FT_T){var ftElapsed=performance.now()-FT_T;if(ftElapsed<500){fade=ftElapsed/500}else{FT_T=0}}
  N.forEach(function(n){if(FT&&n.tp!==FT)return;if(FT_tag&&(!n.g||n.g.indexOf(FT_tag)<0))return;vis[n.i]=1});
  var F=S?S.i:null,NB={};
  if(F!=null){
    NB[F]=1;
    function addNeighbors(nodeSet,depth){
      var next={};
      Object.keys(nodeSet).forEach(function(k){
        var nid=parseInt(k);
        L.forEach(function(l){
          if(ET&&ET.indexOf(l.r||'references')<0)return;
          var s=typeof l.source=='object'?l.source.i:l.source,t=typeof l.target=='object'?l.target.i:l.target;
          if(s==nid&&t!=F){next[t]=1}if(t==nid&&s!=F){next[s]=1}
        });
      });
      Object.keys(next).forEach(function(kk){NB[parseInt(kk)]=1});
      if(depth>1&&Object.keys(next).length)addNeighbors(next,depth-1);
    }
    addNeighbors({[F]:1},HL);
  }

  // edges
  L.forEach(function(l){
  var a=typeof l.source=='object'?l.source:M[l.source],b=typeof l.target=='object'?l.target:M[l.target];
  if(ET&&ET.indexOf(l.r||'references')<0)return;
  if(!a||!b||!vis[a.i]||!vis[b.i])return;
  if(F!=null&&!NB[a.i]&&!NB[b.i])return;
  var dx=b.x-a.x,dy=b.y-a.y,dd=Math.hypot(dx,dy)||1;
  var off=Math.min(dd*0.12,20);
  var cp1=(a.x+b.x)/2-dy/dd*off,cp2=(a.y+b.y)/2+dx/dd*off;
  cx.beginPath();cx.moveTo(a.x,a.y);cx.quadraticCurveTo(cp1,cp2,b.x,b.y);
  var lc=l.cl||(DARK?'rgba(255,255,255,.2)':'rgba(0,0,0,.08)');cx.globalAlpha=1;
  if(F!=null&&(a.i==F||b.i==F)){cx.strokeStyle=lc;cx.lineWidth=1.5;cx.globalAlpha=.6}
  else if(F!=null&&NB[a.i]&&NB[b.i]){cx.strokeStyle=lc;cx.lineWidth=.8;cx.globalAlpha=.35}
  else{cx.strokeStyle=lc;cx.lineWidth=.5;cx.globalAlpha=.2}
  cx.stroke();cx.globalAlpha=1;
  });

  // nodes
  N.forEach(function(n){
    if(!vis[n.i])return;
    var sa=F!=null&&n.i==F,inF=F==null||NB[n.i];
    if(F!=null&&!inF){return}
    var r=sa?10:inF&&F!=null?7:6;
    // 知识质量标记
    var nm=sa?null:getNodeMarker(n);
    // 低置信：节点半透明
    if(nm&&nm.indexOf('lowconf')>=0){cx.globalAlpha=0.55}
    // 过期：淡黄色光晕
    if(nm&&nm.indexOf('stale')>=0&&!sa){
      cx.globalAlpha=0.08;cx.fillStyle='#fbbf24';
      cx.beginPath();cx.arc(n.x,n.y,r+6,0,Math.PI*2);cx.fill();cx.globalAlpha=1
    }
    if(sa){cx.globalAlpha=0.15;cx.fillStyle=n.c;cx.beginPath();cx.arc(n.x,n.y,r+8,0,Math.PI*2);cx.fill();cx.globalAlpha=1}
    if(inF&&F!=null&&!sa){cx.globalAlpha=.15;cx.fillStyle=n.c;cx.beginPath();cx.arc(n.x,n.y,r+3,0,Math.PI*2);cx.fill();cx.globalAlpha=1}
    cx.fillStyle=n.c;cx.beginPath();cx.arc(n.x,n.y,r,0,Math.PI*2);cx.fill();
    cx.globalAlpha=1;
    if(sa){cx.strokeStyle='#fff';cx.lineWidth=3;cx.stroke()}
    else if(inF&&F!=null){cx.strokeStyle=DARK?'rgba(255,255,255,.3)':'rgba(0,0,0,.15)';cx.lineWidth=0.8;cx.stroke()}
    // 未验证：红色小点（画在节点上方，不受主圆遮挡）
    if(nm&&nm.indexOf('unverified')>=0&&!sa){
      cx.fillStyle='#ef4444';
      cx.beginPath();cx.arc(n.x,n.y-r-3,1.2,0,Math.PI*2);cx.fill();
    }
  });
  cx.restore();
}

    var a=S&&n.i==S.i?' on':'';
    var pc=n.pn?' pd':'';
    var ps=n.pn?'★':'☆';
    return '<div class="ni'+a+'" data-i="'+n.i+'"><span class="dt" style="background:'+n.c+'"></span><div class="if"><div class="tl"><span class="id">#'+n.i+'</span>'+n.n+'</div><div class="mt">'+labelType(n.tp)+' · '+n.dg+'连接'+((n.g||[]).length?' · '+(n.g||[]).slice(0,2).join(', '):'')+'</div></div><button class="pb'+pc+'" data-i="'+n.i+'">'+ps+'</button></div>';
  }
  var pinned=f.filter(function(n){return n.pn});
  var normal=f.filter(function(n){return !n.pn});
  document.getElementById('nlp').innerHTML=pinned.map(render).join('');
  document.getElementById('nls').innerHTML=normal.map(render).join('');
  el.querySelectorAll('.ni').forEach(function(e){
    e.onclick=function(){var id=parseInt(this.getAttribute('data-i'));var t=M[id];if(t)select(t)};
  });
  el.querySelectorAll('.pb').forEach(function(b){
    b.onclick=function(e){e.stopPropagation();var id=parseInt(this.getAttribute('data-i'));var n=M[id];
      fetch('/api/pin?id='+id).then(function(r){return r.json()}).then(function(d){
        if(d.pinned!==undefined){n.pn=d.pinned;updateList()}
      });
    };
  });
  document.getElementById('sc').textContent=N.length+' 节点';
  document.getElementById('ss').textContent=f.length+' 显示';
  draw();
}
document.getElementById('q').oninput=function(){pauseDrift();updateList()};
document.getElementById('so').onclick=function(){pauseDrift();SO=SO==='asc'?'desc':'asc';this.textContent=SO==='asc'?'# ↓':'# ↑';saveState();updateList()};

function initFilters(){
  var ts={};N.forEach(function(n){if(n.tp)ts[n.tp]=true});
  var h='<span class="p on" data-t="">全部</span>';Object.keys(ts).sort().forEach(function(t){h+='<span class="p'+(FT===t?' on':'')+'" data-t="'+t+'">'+labelType(t)+'</span>'});
  var fb=document.getElementById('fb');fb.innerHTML=h;
  fb.querySelectorAll('.p').forEach(function(e){
    e.onclick=function(){pauseDrift();
      fb.querySelectorAll('.p').forEach(function(p){p.classList.remove('on')});
      this.classList.add('on');FT=this.getAttribute('data-t')||null;FT_tag=null;S=null;document.getElementById('dt').classList.remove('on');FT_T=performance.now();
      fitFiltered();updateList();saveState();
    }
  });
}

rs();window.addEventListener('resize',function(){rs();if(!S)fitView()});
fetch('api/data').then(function(r){return r.json()}).then(function(G){
  N=G.nodes;
  L=G.links.map(function(l){return{source:l.s,target:l.t,r:l.r,cl:l.cl}});
  N.forEach(function(n){M[n.i]=n});calcDeg();
  sim=d3.forceSimulation(N)
    .force('link',d3.forceLink(L).id(function(d){return d.i}).distance(25).strength(1))
    .force('charge',d3.forceManyBody().strength(-20))
    .force('center',d3.forceCenter(0,0))
    .force('collision',d3.forceCollide(function(d){return 6+(d.ds||0)*2}))
    .alphaDecay(0.03).velocityDecay(0.4);
  sim.on('tick',function(){if(!S&&++TC%3==0)draw()});
  sim.alpha(0.25);
  // 恢复上次选中的节点
  if(_savedState&&_savedState.sel){
    var nn=M[_savedState.sel];
    if(nn){setTimeout(function(){select(nn)},100)}
  }
  buildLegend();initFilters();updateList();setTimeout(driftTick,1000);
  // 加载 dashboard
  fetch('api/summary').then(function(r){return r.json()}).then(renderDashboard).catch(function(){});
}).catch(function(){document.getElementById('sc').textContent='ERR';setTimeout(driftTick,1000)});

document.addEventListener('keydown',function(e){if(e.key==='Escape'){goHome()}});
</script></body></html>
